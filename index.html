<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARYAN Study OS V10</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:#020617;padding:15px;text-align:center;font-size:22px;font-weight:bold}

.dashboard{display:flex;flex-direction:column;min-height:100vh}
.content{flex:1;padding:15px}

.bottomNav{position:fixed;bottom:0;left:0;right:0;background:#020617;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #1e293b}
.bottomNav button{background:none;color:white;border:none;font-size:14px}

.card{background:#1e293b;border-radius:12px;padding:15px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.subject{background:#0f172a;padding:10px;border-radius:10px}
.timer{font-size:18px;margin:5px 0}

button{cursor:pointer;border:none;border-radius:6px;padding:6px 10px;margin:3px}
.start{background:#22c55e}
.stop{background:#ef4444}
.rename{background:#f59e0b}
.delete{background:#ef4444}
.add{background:#3b82f6}
.install{background:#16a34a}

input,select{padding:6px;border-radius:6px;border:none;margin:3px}

.stat{background:#0f172a;padding:10px;border-radius:8px;margin:5px}
.flex{display:flex;flex-wrap:wrap}

canvas{background:white;border-radius:10px;padding:10px}

.chatBox{height:220px;overflow-y:auto;background:#020617;padding:10px;border-radius:8px;margin-top:10px}
.msg{margin:4px 0}

.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.heat{height:20px;border-radius:3px;background:#1e293b}

.typing{font-size:12px;color:#94a3b8}

.online{color:#22c55e;font-size:12px}

.music{margin-top:10px}
</style>
</head>

<body>
<header>
ARYAN Study OS V10
<button class="install" id="installBtn" style="display:none">Install App</button>
</header>

<div class="dashboard">

<div class="content">

<div id="dashboard" class="tab">
<div class="card">
<h2>Stats</h2>
<div class="flex">
<div class="stat" id="today">Today: 0h</div>
<div class="stat" id="week">Week: 0h</div>
<div class="stat" id="month">Month: 0h</div>
<div class="stat" id="streak">Streak: 0 🔥</div>
</div>

<h3>Study Heatmap</h3>
<div id="heatmap" class="heatmap"></div>

</div>
</div>

<div id="subjects" class="tab" style="display:none">
<div class="card">
<h2>Add Tracker</h2>
<input id="subjectInput" placeholder="Name">
<select id="categoryInput">
<option>Study</option>
<option>Skill</option>
<option>Health</option>
<option>Work</option>
<option>Other</option>
</select>
<button class="add" onclick="addSubject()">Add</button>
</div>

<div class="card">
<h2>Trackers</h2>
<div class="grid" id="subjectGrid"></div>
</div>
</div>

<div id="analytics" class="tab" style="display:none">
<div class="card"><h2>Daily Study</h2><canvas id="dayChart"></canvas></div>
<div class="card"><h2>Weekly Study</h2><canvas id="weekChart"></canvas></div>
<div class="card"><h2>Monthly Study</h2><canvas id="monthChart"></canvas></div>
</div>

<div id="pomodoro" class="tab" style="display:none">
<div class="card">
<h2>Pomodoro Focus</h2>
<h1 id="pomoTimer">25:00</h1>
<button onclick="startPomo()">Start</button>
<button onclick="resetPomo()">Reset</button>

<div class="music">
<h3>Focus Music</h3>
<audio controls loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b0c1a6d5.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
</audio>
</div>

</div>
</div>

<div id="room" class="tab" style="display:none">
<div class="card">
<h2>Study Room</h2>

<input id="roomName" placeholder="Room name">
<input id="userName" placeholder="Your name">
<button onclick="joinRoom()">Join Room</button>
<button onclick="copyInvite()">Invite Link</button>

<h3>Online Users</h3>
<div id="roomUsers"></div>

<h3>Chat</h3>
<div class="chatBox" id="chatBox"></div>
<div id="typing" class="typing"></div>
<input id="chatInput" placeholder="Message" oninput="typing()">
<button onclick="sendMsg()">Send</button>

<br><br>
<button onclick="startVoice()">🎤 Voice Room</button>

</div>
</div>

</div>

<div class="bottomNav">
<button onclick="tab('dashboard')">Home</button>
<button onclick="tab('subjects')">Track</button>
<button onclick="tab('analytics')">Stats</button>
<button onclick="tab('pomodoro')">Focus</button>
<button onclick="tab('room')">Room</button>
</div>

</div>

<script>

function tab(id){
 document.querySelectorAll('.tab').forEach(t=>t.style.display='none')
 document.getElementById(id).style.display='block'
}

const firebaseConfig={
apiKey:"AIzaSyCZeJsYAz9CwAxWHXmJ6z9pznyK7Yvg1VQ",
authDomain:"study-tracker-app-3606a.firebaseapp.com",
databaseURL:"https://study-tracker-app-3606a-default-rtdb.firebaseio.com",
projectId:"study-tracker-app-3606a",
storageBucket:"study-tracker-app-3606a.firebasestorage.app",
messagingSenderId:"917490074799",
appId:"1:917490074799:web:47b32dfc46a05934ac805a"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let subjects=JSON.parse(localStorage.getItem("subjects"))||[]
let data=JSON.parse(localStorage.getItem("data"))||{}
let timers={}

let room=null
let user=null

let today=new Date().toISOString().slice(0,10)
if(!data[today]) data[today]={subjects:{}}

function save(){
localStorage.setItem("subjects",JSON.stringify(subjects))
localStorage.setItem("data",JSON.stringify(data))
}

function addSubject(){
let name=document.getElementById("subjectInput").value
let cat=document.getElementById("categoryInput").value
if(!name) return
subjects.push({name,cat})
save()
renderSubjects()
}

function deleteSubject(name){
subjects=subjects.filter(s=>s.name!==name)
delete data[today].subjects[name]
save()
renderSubjects()
}

function renameSubject(name){
let newName=prompt("Rename subject",name)
if(!newName) return
subjects.forEach(s=>{if(s.name===name)s.name=newName})
data[today].subjects[newName]=data[today].subjects[name]
delete data[today].subjects[name]
save()
renderSubjects()
}

function renderSubjects(){
let grid=document.getElementById("subjectGrid")
if(!grid) return

grid.innerHTML=""

subjects.forEach(s=>{

if(!data[today].subjects[s.name]) data[today].subjects[s.name]=0

let sec=data[today].subjects[s.name]
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)

let div=document.createElement("div")
div.className="subject"

div.innerHTML=`
<b>${s.name}</b> (${s.cat})
<div class='timer' id='t-${s.name}'>${h}h ${m}m</div>
<button class='start' onclick="start('${s.name}')">Start</button>
<button class='stop' onclick="stop('${s.name}')">Stop</button>
<button class='rename' onclick="renameSubject('${s.name}')">Rename</button>
<button class='delete' onclick="deleteSubject('${s.name}')">Delete</button>
`

grid.appendChild(div)

})
}

function start(s){
if(timers[s]) return

timers[s]=setInterval(()=>{

data[today].subjects[s]++
updateTimer(s)
updateStats()
save()

},1000)
}

function stop(s){
clearInterval(timers[s])
timers[s]=null
}

function updateTimer(s){
let sec=data[today].subjects[s]
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
let el=document.getElementById("t-"+s)
if(el) el.innerText=`${h}h ${m}m`
}

function sum(obj){return Object.values(obj||{}).reduce((a,b)=>a+b,0)}

function updateStats(){
let todayTime=sum(data[today].subjects)
document.getElementById("today").innerText="Today: "+Math.floor(todayTime/3600)+"h"
renderHeatmap()
}

function renderHeatmap(){
let box=document.getElementById("heatmap")
if(!box) return

box.innerHTML=""

let days=Object.keys(data).slice(-35)

days.forEach(d=>{
let t=sum(data[d].subjects)
let div=document.createElement("div")
div.className="heat"

if(t>0) div.style.background="#22c55e"

box.appendChild(div)
})
}

function typing(){
if(!room||!user) return

db.ref("rooms/"+room+"/typing").set(user+" typing...")

setTimeout(()=>{
 db.ref("rooms/"+room+"/typing").set("")
},1000)
}

function sendMsg(){
let txt=document.getElementById("chatInput").value
if(!txt||!room) return

 db.ref("rooms/"+room+"/chat").push({user:user,msg:txt})

 document.getElementById("chatInput").value=""
}

function copyInvite(){
let link=location.href+"?room="+room
navigator.clipboard.writeText(link)
alert("Invite link copied")
}

function joinRoom(){
room=document.getElementById("roomName").value
user=document.getElementById("userName").value

if(!room||!user) return

 db.ref("rooms/"+room+"/users/"+user).set({online:true})

listenChat()
listenUsers()
}

function listenUsers(){

db.ref("rooms/"+room+"/users").on("value",snap=>{

let box=document.getElementById("roomUsers")
box.innerHTML=""

let users=snap.val()||{}

Object.keys(users).forEach(u=>{
let d=document.createElement("div")
d.innerHTML=u+" <span class='online'>● online</span>"
box.appendChild(d)
})

})

}

function listenChat(){

 db.ref("rooms/"+room+"/chat").on("child_added",snap=>{

 let m=snap.val()
 let box=document.getElementById("chatBox")

 let div=document.createElement("div")
 div.className="msg"
 div.innerText=m.user+": "+m.msg

 box.appendChild(div)
 box.scrollTop=box.scrollHeight

 })

 db.ref("rooms/"+room+"/typing").on("value",snap=>{
 document.getElementById("typing").innerText=snap.val()||""
 })

}

function startVoice(){
 navigator.mediaDevices.getUserMedia({audio:true}).then(()=>{
 alert("Voice mic connected")
 })
}

let deferredPrompt=null
const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault()
 deferredPrompt=e
 installBtn.style.display="inline-block"
})

installBtn.addEventListener("click",async()=>{
 if(!deferredPrompt) return

 deferredPrompt.prompt()
 await deferredPrompt.userChoice

 deferredPrompt=null
 installBtn.style.display="none"
})

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js')
}

if(Notification && Notification.permission!="granted"){
 Notification.requestPermission()
}

window.onload=function(){
renderSubjects()
updateStats()
}

</script>

</body>
</html>
