<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARYAN Version 8</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:#020617;padding:15px;text-align:center;font-size:24px;font-weight:bold}
.dashboard{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#020617;padding:20px}
.sidebar button{width:100%;margin:6px 0;padding:10px;border:none;border-radius:8px;background:#1e293b;color:white;cursor:pointer}
.content{padding:20px}
.card{background:#1e293b;border-radius:12px;padding:15px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.subject{background:#0f172a;padding:10px;border-radius:10px}
.timer{font-size:18px;margin:5px 0}
button{cursor:pointer;border:none;border-radius:6px;padding:6px 10px;margin:3px}
.start{background:#22c55e}
.stop{background:#ef4444}
.rename{background:#f59e0b}
.delete{background:#ef4444}
.add{background:#3b82f6}
.install{background:#16a34a}
input,select{padding:6px;border-radius:6px;border:none;margin:3px}
.stat{background:#0f172a;padding:10px;border-radius:8px;margin:5px}
.flex{display:flex;flex-wrap:wrap}
canvas{background:white;border-radius:10px;padding:10px}
.chatBox{height:250px;overflow-y:auto;background:#020617;padding:10px;border-radius:8px;margin-top:10px}
.msg{margin:4px 0}
</style>
</head>

<body>
<header>
ARYAN Version 8
<button class="install" id="installBtn" style="display:none">Install App</button>
</header>

<div class="dashboard">

<div class="sidebar">
<button onclick="tab('dashboard')">Dashboard</button>
<button onclick="tab('subjects')">Track</button>
<button onclick="tab('analytics')">Analytics</button>
<button onclick="tab('pomodoro')">Pomodoro</button>
<button onclick="tab('room')">Friends</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<div class="card">
<h2>Stats</h2>
<div class="flex">
<div class="stat" id="today">Today: 0h</div>
<div class="stat" id="week">Week: 0h</div>
<div class="stat" id="month">Month: 0h</div>
<div class="stat" id="streak">Streak: 0 🔥</div>
</div>
</div>
</div>

<!-- SUBJECT TRACKER -->
<div id="subjects" class="tab" style="display:none">
<div class="card">
<h2>Add Tracker</h2>
<input id="subjectInput" placeholder="Name">
<select id="categoryInput">
<option>Study</option>
<option>Skill</option>
<option>Health</option>
<option>Work</option>
<option>Other</option>
</select>
<button class="add" onclick="addSubject()">Add</button>
</div>

<div class="card">
<h2>Trackers</h2>
<div class="grid" id="subjectGrid"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="tab" style="display:none">
<div class="card">
<h2>Daily Study</h2>
<canvas id="dayChart"></canvas>
</div>

<div class="card">
<h2>Weekly Study</h2>
<canvas id="weekChart"></canvas>
</div>

<div class="card">
<h2>Monthly Study</h2>
<canvas id="monthChart"></canvas>
</div>
</div>

<!-- POMODORO -->
<div id="pomodoro" class="tab" style="display:none">
<div class="card">
<h2>Pomodoro Focus</h2>
<h1 id="pomoTimer">25:00</h1>
<button onclick="startPomo()">Start</button>
<button onclick="resetPomo()">Reset</button>
</div>
</div>

<!-- FRIENDS ROOM -->
<div id="room" class="tab" style="display:none">
<div class="card">
<h2>Friends Study Room</h2>
<input id="roomName" placeholder="Room name">
<input id="userName" placeholder="Your name">
<button onclick="joinRoom()">Join Room</button>

<div class="card" style="margin-top:10px">
<b>Invite Link</b>
<div id="inviteLink">Join a room to generate link</div>
</div>

<h3>Active Users / Leaderboard</h3>
<div id="roomUsers"></div>

<h3>Room Study Graph</h3>
<canvas id="roomChart"></canvas>

<h3>Chat</h3>
<div class="chatBox" id="chatBox"></div>
<input id="chatInput" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div>
</div>

</div>
</div>

<script>

function tab(id){
 document.querySelectorAll('.tab').forEach(t=>t.style.display='none')
 document.getElementById(id).style.display='block'
}

/* Firebase */
const firebaseConfig={
apiKey:"AIzaSyCZeJsYAz9CwAxWHXmJ6z9pznyK7Yvg1VQ",
authDomain:"study-tracker-app-3606a.firebaseapp.com",
databaseURL:"https://study-tracker-app-3606a-default-rtdb.firebaseio.com",
projectId:"study-tracker-app-3606a",
storageBucket:"study-tracker-app-3606a.firebasestorage.app",
messagingSenderId:"917490074799",
appId:"1:917490074799:web:47b32dfc46a05934ac805a"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

/* Local storage */
let subjects=JSON.parse(localStorage.getItem("subjects"))||[]
let data=JSON.parse(localStorage.getItem("data"))||{}
let timers={}
let room=localStorage.getItem("room")||null
let user=localStorage.getItem("user")||null

let today=new Date().toISOString().slice(0,10)
if(!data[today]) data[today]={subjects:{}}

function save(){
localStorage.setItem("subjects",JSON.stringify(subjects))
localStorage.setItem("data",JSON.stringify(data))
}

function addSubject(){
let name=document.getElementById("subjectInput").value
let cat=document.getElementById("categoryInput").value
if(!name) return
subjects.push({name,cat})
save()
renderSubjects()
}

function deleteSubject(name){
subjects=subjects.filter(s=>s.name!==name)
delete data[today].subjects[name]
save()
renderSubjects()
}

function renameSubject(name){
let newName=prompt("Rename subject",name)
if(!newName) return
subjects.forEach(s=>{if(s.name===name)s.name=newName})
data[today].subjects[newName]=data[today].subjects[name]
delete data[today].subjects[name]
save()
renderSubjects()
}

function renderSubjects(){
let grid=document.getElementById("subjectGrid")
if(!grid) return

grid.innerHTML=""

subjects.forEach(s=>{

if(!data[today].subjects[s.name]) data[today].subjects[s.name]=0

let sec=data[today].subjects[s.name]
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)

let div=document.createElement("div")
div.className="subject"

div.innerHTML=`
<b>${s.name}</b> (${s.cat})
<div class='timer' id='t-${s.name}'>${h}h ${m}m</div>
<button class='start' onclick="start('${s.name}')">Start</button>
<button class='stop' onclick="stop('${s.name}')">Stop</button>
<button class='rename' onclick="renameSubject('${s.name}')">Rename</button>
<button class='delete' onclick="deleteSubject('${s.name}')">Delete</button>
`

grid.appendChild(div)

})
}

function start(s){
if(timers[s]) return

timers[s]=setInterval(()=>{

data[today].subjects[s]++
updateTimer(s)
updateStats()
save()
updateRoomTime()

},1000)
}

function stop(s){
clearInterval(timers[s])
timers[s]=null
}

function updateTimer(s){
let sec=data[today].subjects[s]
let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
let el=document.getElementById("t-"+s)
if(el) el.innerText=`${h}h ${m}m`
}

function sum(obj){return Object.values(obj||{}).reduce((a,b)=>a+b,0)}

function updateStats(){
let todayTime=sum(data[today].subjects)
document.getElementById("today").innerText="Today: "+Math.floor(todayTime/3600)+"h"
calcStreak()
}

function calcStreak(){
let days=Object.keys(data)
let streak=0
for(let i=days.length-1;i>=0;i--){
let t=sum(data[days[i]].subjects)
if(t>0) streak++
else break
}
document.getElementById("streak").innerText="Streak: "+streak+" 🔥"
}

/* Pomodoro */
let pomo=1500
let pomoTimer=null

function startPomo(){
if(pomoTimer) return
pomoTimer=setInterval(()=>{
pomo--
let m=Math.floor(pomo/60)
let s=pomo%60

document.getElementById("pomoTimer").innerText=`${m}:${s.toString().padStart(2,'0')}`

if(pomo<=0){
alert("Focus session complete")
clearInterval(pomoTimer)
pomoTimer=null
pomo=1500
}

},1000)
}

function resetPomo(){
clearInterval(pomoTimer)
pomoTimer=null
pomo=1500

document.getElementById("pomoTimer").innerText="25:00"
}

/* ROOM SYSTEM */
function joinRoom(){

room=document.getElementById("roomName").value.trim()
user=document.getElementById("userName").value.trim()

if(!room||!user){
alert("Enter room name and your name")
return
}

// save permanent room
localStorage.setItem("room",room)
localStorage.setItem("user",user)

// add user

db.ref("rooms/"+room+"/users/"+user).set({time:0,online:true})

// join message

db.ref("rooms/"+room+"/chat").push({system:true,msg:user+" joined the room",time:Date.now()})

listenRoom()
listenChat()

alert("Joined room: "+room)

}

function updateRoomTime(){
if(!room||!user) return

let total=sum(data[today].subjects)

// find active subject
let active=""
for(let k in timers){ if(timers[k]) active=k }

 db.ref("rooms/"+room+"/users/"+user).set({
 time:Math.floor(total/3600),
 studying:active||"Idle",
 online:true
 })
})
}

function listenRoom(){

db.ref("rooms/"+room+"/users").on("value",snap=>{

let box=document.getElementById("roomUsers")
box.innerHTML=""

let users=snap.val()||{}

let arr=Object.entries(users).sort((a,b)=>(b[1].time||0)-(a[1].time||0))

arr.forEach(u=>{

let d=document.createElement("div")

let online=u[1].online?"🟢":"⚪"

 d.innerText=`${online} ${u[0]} — ${u[1].time||0}h (${u[1].studying||'Idle'})`

box.appendChild(d)

})

})
}

/* CHAT */
function sendMsg(){

let txt=document.getElementById("chatInput").value

if(!txt||!room) return

 db.ref("rooms/"+room+"/chat").push({user:user,msg:txt,time:Date.now()})

 document.getElementById("chatInput").value=""

}

function listenChat(){

 db.ref("rooms/"+room+"/chat").off()

 db.ref("rooms/"+room+"/chat").on("child_added",snap=>{

 let m=snap.val()
 let box=document.getElementById("chatBox")

 if(!box) return

 let div=document.createElement("div")
 div.className="msg"

 if(m.system){
 div.innerText="⚡ "+m.msg
 div.style.color="#38bdf8"
 }else{
 div.innerText=m.user+": "+m.msg
 }

 box.appendChild(div)
 box.scrollTop=box.scrollHeight

 })

}

/* PWA */
let deferredPrompt

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").style.display="inline-block"

})

installBtn.onclick=()=>{

deferredPrompt.prompt()

deferredPrompt.userChoice.then(()=>{
installBtn.style.display="none"
})

}

/* Service Worker */
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js')
}

window.onload=function(){
renderSubjects()
updateStats()

// URL room invite
let params=new URLSearchParams(window.location.search)
let r=params.get("room")
if(r){
room=r
localStorage.setItem("room",room)
}

// auto join saved room
if(room && user){

let rn=document.getElementById("roomName")
let un=document.getElementById("userName")

if(rn) rn.value=room
if(un) un.value=user

// show invite link
let link=window.location.origin+"/?room="+room
let el=document.getElementById("inviteLink")
if(el) el.innerText=link

listenRoom()
listenChat()
listenRoomGraph()

}
}

/* ROOM GRAPH */
let roomChart

function listenRoomGraph(){
if(!room) return

 db.ref("rooms/"+room+"/users").on("value",snap=>{

 let users=snap.val()||{}
 let labels=[]
 let hours=[]

 Object.entries(users).forEach(u=>{
 labels.push(u[0])
 hours.push(u[1].time||0)
 })

 let ctx=document.getElementById("roomChart")
 if(!ctx) return

 if(roomChart) roomChart.destroy()

 roomChart=new Chart(ctx,{
 type:"bar",
 data:{labels:labels,datasets:[{label:"Study Hours",data:hours}]}
 })

 })
}

}

</script>

</body>
</html>
